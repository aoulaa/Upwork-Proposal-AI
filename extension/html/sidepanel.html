<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upwork Autopilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/sidepanel.css" />
</head>

<body>

  <!-- ── Header ─────────────────────────────────────── -->
  <header class="header">
    <div class="header-logo">
      <div class="logo-icon">✦</div>
      <div class="header-text">
        <span class="header-title">Proposal AI</span>
        <span class="header-sub">Upwork Professional Writer</span>
      </div>
    </div>
    <div id="status-badge" class="badge badge--idle">Idle</div>
  </header>

  <!-- ── API Key Setup (shown until key is saved) ──── -->
  <section id="setup-section" class="section setup-section hidden">
    <p class="setup-hint">Enter your <strong>Gemini API Key</strong> and select your <strong>Model</strong>.</p>

    <div class="input-group" style="margin-bottom: 12px;">
      <label class="input-label"
        style="display: block; font-size: 11px; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em;">Model</label>
      <select id="model-select" class="text-input"
        style="width: 100%; appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238A91A8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22/%3E%3C/svg%3E'); background-repeat: no-repeat; background-position: right 10px top 50%; background-size: 8px auto; padding-right: 30px;">
        <optgroup label="Gemini 3.x (Frontier)">
          <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview (Recommended)</option>
          <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
          <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash-Lite Preview</option>
        </optgroup>
        <optgroup label="Gemini 2.5 (High Performance)">
          <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
          <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
          <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite</option>
        </optgroup>
      </select>
    </div>

    <div class="input-group" style="margin-bottom: 14px;">
      <label class="input-label"
        style="display: block; font-size: 11px; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em;">API
        Key</label>
      <div class="input-row">
        <input type="password" id="api-key-input" class="text-input" placeholder="AIza..." />
        <button id="save-key-btn" class="btn btn--primary btn--sm">Save</button>
      </div>
    </div>
    <a class="setup-link" href="https://aistudio.google.com/app/apikey" target="_blank">Get a free key →</a>
  </section>

  <!-- ── Main Panel ─────────────────────────────────── -->
  <main id="main-section" class="section hidden">
    <div class="card card--fill">
      <div class="card-header">
        <span class="step-pill step-pill--green">✓</span>
        <span class="card-title">Autopilot is Ready</span>
      </div>
      <p class="card-hint" style="margin-bottom: 0;">Whenever you click <strong>Apply Now</strong> on an Upwork job,
        your custom AI proposal will be generated and inserted automatically!</p>
    </div>
  </main>

  <!-- ── Toast Notification ─────────────────────────── -->
  <div id="toast" class="toast hidden"></div>

  <!-- ── Footer ─────────────────────────────────────── -->
  <footer class="footer">
    <button id="reset-key-btn" class="footer-link">Change API Key</button>
    <span class="footer-sep">·</span>
    <span class="footer-version">v1.0.0</span>
  </footer>

  <script type="module" src="../sidepanel.js"></script>
</body>

</html>
